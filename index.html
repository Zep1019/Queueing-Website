<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sidebar Layout</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="sidebar">
    <div class="logo">
      LOGO
    </div>

    <button class="nav-button" onclick="openCourt()">Court</button>
    <button class="nav-button">2nd button</button>
    <button class="nav-button">Button 3</button>
  </div>

  <div class="content">
    <h1>Admin Panel</h1>
    <p>Input new player details:</p>

    <form class="player-form">
      <label for="player-name">Player Name:</label>
      <input type="text" id="player-name" placeholder="Enter player name">

      <label for="player-level">Player Level:</label>
      <select id="player-level">
        <option value="">Select level</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
        <option value="pro">Pro</option>
      </select>

      <button type="button" class="save-button">Save</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
