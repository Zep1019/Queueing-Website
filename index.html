<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="sidebar">
    <div class="logo">LOGO</div>

    <button class="nav-button" onclick="openCourt()">Court</button>
    <button class="nav-button">Player List</button>
    <button class="nav-button">Edit Queue</button>
  </div>

  <div class="content">
    <h1>Admin Panel</h1>

    <div class="admin-containers">
      <!-- Add New Player Container (Upper Left) -->
      <div class="player-container add-player">
        <h2>Add New Player</h2>
        <form class="player-form">
          <label for="player-name">Player Name:</label>
          <input type="text" id="player-name" placeholder="Enter player name">

          <label for="player-level">Player Level:</label>
          <select id="player-level">
            <option value="">Select level</option>
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
            <option value="pro">Pro</option>
          </select>

          <button type="button" class="save-button">Save</button>
        </form>
      </div>

      <!-- Remove Player Container (Upper Right) -->
      <div class="player-container remove-player">
        <h2>Remove Player</h2>
        <form class="remove-form">
          <label for="remove-name">Player Name:</label>
          <input type="text" id="remove-name" placeholder="Enter player name">

          <button type="button" class="remove-button">Remove</button>
        </form>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
