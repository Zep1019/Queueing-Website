<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Court Page</title>
  <link rel="stylesheet" href="court-style.css">
</head>
<body>
  <div class="main-container">
    <h1>Court Page</h1>

    <div class="content-container">
      <!-- Courts Grid (Left/Middle) -->
      <div class="courts-section">
        <div class="grid-container">
          <!-- Court 1 -->
          <div class="court-box">
            <div class="court-title">Court 1</div>
            <div class="court-players">
              <div>Player A</div>
              <div>Player B</div>
              <div>Player C</div>
              <div>Player D</div>
            </div>
          </div>

          <!-- Court 2 -->
          <div class="court-box">
            <div class="court-title">Court 2</div>
            <div class="court-players">
              <div>Empty</div>
              <div>Empty</div>
              <div>Empty</div>
              <div>Empty</div>
            </div>
          </div>

          <!-- Court 3 -->
          <div class="court-box">
            <div class="court-title">Court 3</div>
            <div class="court-players">
              <div>Empty</div>
              <div>Empty</div>
              <div>Empty</div>
              <div>Empty</div>
            </div>
          </div>

          <!-- Court 4 -->
          <div class="court-box">
            <div class="court-title">Court 4</div>
            <div class="court-players">
              <div>Empty</div>
              <div>Empty</div>
              <div>Empty</div>
              <div>Empty</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Up Next Panel (Right) -->
      <div class="queue-section">
        <h2>Up Next</h2>
        <div class="queue-box">
          <ul class="queue-list">
            <li>Team E vs Team F</li>
            <li>Team G vs Team H</li>
            <li>Team I vs Team J</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
