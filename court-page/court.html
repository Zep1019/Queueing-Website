<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Court Page</title>
  <link rel="stylesheet" href="court-style.css">
</head>
<body>

  <h1>Court Page</h1>

  <div class="grid-container">
    <div class="court-box">Box 1</div>
    <div class="court-box">Box 2</div>
    <div class="court-box">Box 3</div>
    <div class="court-box">Box 4</div>
  </div>

  <!-- ✅ Footer / Up Next Section -->
  <footer class="footer-queue">
    <div class="queue-container">
      <h2>Up Next</h2>
      <div class="queue-box">
        <p>No players yet</p>
      </div>
    </div>
  </footer>

</body>
</html>
