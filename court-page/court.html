<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Court Page</title>
  <link rel="stylesheet" href="court-style.css">
</head>
<body>
  <div class="main-container">
    <h1>Court Page</h1>

    <!-- Courts Grid -->
    <div class="grid-container">
      <!-- Court 1 -->
      <div class="court-box">
        <div class="court-title">Court 1</div>
        <div class="court-players">
          <div>Player A</div>
          <div>Player B</div>
          <div>Player C</div>
          <div>Player D</div>
        </div>
      </div>

      <!-- Court 2 -->
      <div class="court-box">
        <div class="court-title">Court 2</div>
        <div class="court-players">
          <div>Empty</div>
          <div>Empty</div>
          <div>Empty</div>
          <div>Empty</div>
        </div>
      </div>

      <!-- Court 3 -->
      <div class="court-box">
        <div class="court-title">Court 3</div>
        <div class="court-players">
          <div>Empty</div>
          <div>Empty</div>
          <div>Empty</div>
          <div>Empty</div>
        </div>
      </div>

      <!-- Court 4 -->
      <div class="court-box">
        <div class="court-title">Court 4</div>
        <div class="court-players">
          <div>Empty</div>
          <div>Empty</div>
          <div>Empty</div>
          <div>Empty</div>
        </div>
      </div>
    </div>

    <!-- Footer / Up Next Queue -->
    <footer class="footer-queue">
      <div class="queue-container">
        <h2>Up Next</h2>
        <div class="queue-box">
          <ul class="queue-list">
            <li>Team E vs Team F</li>
            <li>Team G vs Team H</li>
            <li>Team I vs Team J</li>
          </ul>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
